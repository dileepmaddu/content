<!DOCTYPE html>
<html>
    <head>
        <title> JS basics</title>
    </head>
    <body>
        <script>
            document.write("welcome to js !!!<br>");
            console.log("debugging soon");
            console.table([10,20,30,40,50]);

            document.write(10 + 10, "<br>"); //20
            document.write(10 + "10","<br>"); //1010
            document.write(10+ +"10","<br>"); //20
            document.write(10 -"10","<br>");  //0
            document.write(10 * "10","<br>"); //100
            document.write(10 /"10","<br>");  //1
            //true=1
            //false=0
            document.write(1+true,"<br>");              //2
            document.write(1+true+true+false,"<br>");   //3
            document.write(1+"true","<br>");            //1true
            document.write(1/false,"<br>");             //infinity
            document.write(true/true,"<br>");           //1
            document.write(false/true,"<br>");          //0


            //=(assignment)
            //==(comparison)
            //====(strict comparison)
            document.write(10 == "10","<br>");        //true
            document.write(10 === "10","<br>");       //false
            document.write(1 == "one","<br>");        //false
            document.write(1 === "one","<br>");       //false
            document.write(10>9>8,"<br>");             //false
            document.write(1<2<3,"<br>");              //true
            

            document.write(10+5/10-5,"<br>");          //5.5(according to BODMAS)
            document.write((10+5)/(10-5),"<br>")       //3

            //ternary operator
            //conditino ? block1 : block2;
            true ? document.write("frontend","<br>") : document.write("backend","<br>");
            !true ? document.write("frontend","<br>") : document.write("backend","<br>");
            false ? document.write("frontend","<br>") : document.write("backend","<br>");
            !false ? document.write("frontend","<br>") : document.write("backend","<br>");
            10>9>8 ? document.write("frontend","<br>") : document.write("backend","<br>");
            !(10>9>8) ? document.write("frontend","<br>") : document.write("backend","<br>");



        </script>
    </body>
</html>
