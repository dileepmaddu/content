        <script>
            let emps =[{empID:"101",empname:"emp1",empdept:"CSE",empimage:"https://picsum.photos/100?random=1"},
                       {empID:"102",empname:"emp2",empdept:"ECE",empimage:"https://picsum.photos/100?random=2"},
                       {empID:"103",empname:"emp3",empdept:"IT",empimage:"https://picsum.photos/100?random=3"},
                       {empID:"104",empname:"emp4",empdept:"EEE",empimage:"https://picsum.photos/100?random=4"},
                       {empID:"105",empname:"emp5",empdept:"CIVIL",empimage:"https://picsum.photos/100?random=5"}]
            document.write(`
            <table border="1" align=center cellpadding="10" cellspacing="10">
                <tr>
                    <th>EmpID</th>
                    <th>EmpNAME</th>
                    <th>EmpDEPT</th>
                    <th>EmpIMAGE</th>
                </tr>
            `);
            emps.forEach((element,index)=>{
                document.write(`<tr>
                    <td>${element.empID}</td>
                    <td>${element.empname}</td>
                    <td>${element.empdept}</td>
                     <td>
                        <img src=${element.empimage} width="80">   
                    </td>
                </tr>`);
            });
            document.write(`</table>`);
        </script>
