<!DOCTYPE html>
<html>
    <head>
        <title> grid faq </title>
        <style>
            .parent{
                height: 100vh;
                display: grid;
                grid-template-rows: 50px 50px 450px;
                grid-template-columns: 2fr 2fr 2fr;
                grid-template-areas:
                     "header header header "
                     "search search  rightsidebar"
                     "leftsidebar middlecolumn rightsidebar";
                     gap:10px;
            }
            .header{
               grid-area: header;
               background-color:orange;
            }
            .search{
               grid-area:search;
               background-color: lightgreen;
            }
            .leftsidebar{

                grid-area: leftsidebar;
                background-color: lightskyblue;
            }
            .middlecolumn{
                grid-area:middlecolumn;
                background-color: purple;

            }
            .rightsidebar{
                grid-area:rightsidebar;
                background-color: red;

            }
            
        </style>
    </head>
    <body>
        <div class="parent">
        <div class="header">header</div>
        <div class="search"> search</div>
        <div class="leftsidebar">leftsidebar</div>
         <div class="middlecolumn">middlecolumn</div>
        <div class="rightsidebar">rightsidebar</div>
       
        </div>
    </body>
</html>
