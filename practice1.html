<!DOCTYPE html>
<html>
    <head>
        <title>  Practice Images </title>
        <style>
            img{
                border: 1px solid orange;
                padding:20px;
                margin:20px;
                border-radius: 10px;
            }
            .c1:hover{
               border:10px solid greenyellow;
            }
            .c2:hover{
                height:150px;
                width:150px;
                border: 10px solid crimson;
                border-radius: 30px;
            }
            .c3:hover{
                display:none;
            }
        </style>
    </head>
    <body>
        <img src="flipkart.jpg" alt="flipkart" class="c1">
        <img src="amazon.png" alt="amazon" class="c2">
        <img src="logo.jpg" alt="careerit" class="c3">
    </body>
</html>
