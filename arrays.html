        <!--script>
            /*
            reduce()
            **********
            reduce() function used to sum of array elements
            reduce() function released in ES6 version
            reduce() function called higher order function
            reduce() function will return new array
            reduce() function is immutable function
            starting value in reduce function called as "Accumulator" in below example 150 acts as Accumulator
            */
           let arr1=[10,20,30,40,50];
           let sum1= arr1.reduce((firstElement,nextElement)=>{
               return firstElement + nextElement;
            });
            document.write(sum1);

            let sum2= arr1.reduce((firstElement,nextElement)=>{
               return firstElement + nextElement;
            },150);
            document.write(sum2);



        </script-->
