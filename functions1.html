            ***********************
             generator functions are used to
               1)pass the execution
               2)resume the execution
               3)read data value by value
               usecase:
               **********
               1)async flows
               2)lazy loading 
               
               generator functions starts with "*"
               yield is the keyword, used to pause the execution
               next() is  the function, used to resume tht execution

               */
        </script-->
