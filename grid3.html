<!DOCTYPE html>
<html>
    <head>
        <title> CSS- grid3</title>
    </head>
    <style>
        .parent{
            height: 100vh;
            text-align: center;
            color: white;
            display: grid;
            grid-template-rows: 10% 30% 50% 10%;
            grid-template-columns: 25% 25% 25% 25%;
            gap:10px;
        }
        .header{
            background-color: orange;
            grid-column: 1/5;
            grid-row: 1/2;
        }
        .smallbox1{
            background-color: orange;
            grid-column: 1/2;
            grid-row: 2/3;
        }
        .smallbox2{
            background-color: orange;
            grid-column: 2/3;
            grid-row: 2/3;
        }
        .smallbox3{
            background-color: orange;
            grid-column: 3/4;
            grid-row: 2/3;
        }
        .sidebar{
            background-color:orange;
            grid-column: 4/5;
            grid-row: 2/4;
        }
        .maincontent{
            background-color: orange;
            grid-column: 1/4;
            grid-row: 3/4;
        }
        .footer{
            background-color: orange;
            grid-column: 1/5;
            grid-row: 4/5;
        }
    </style>
    <body>
        <div class="parent"> 
        <div class="header">header</div>
        <div class="smallbox1"> smallbox</div>
        <div class="smallbox2"> smallbox</div>
        <div class="smallbox3"> smallbox</div>
        <div class="sidebar"> sidebar </div>
        <div class="maincontent"> main content </div>
        <div class="footer"> footer </div>
        </div>
    </body>
</html>
