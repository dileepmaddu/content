<!DOCTYPE html>
<html>
    <head>
        <title> Nested List</title>
    </head>
    <body>
        <ol>
            <li>question1</li>
            <ol type="A">
                <li>option1</li>
                <li>option2</li>
                <li>option3</li>
                <li>option4</li>
            </ol>
        </ol>
        <ol>
            <li>question2</li>
            <ol type="i">
                <li>option1</li>
                <li>option2</li>
                <li>option3</li>
                <li>option4</li>
            </ol>
        </ol>
    </body>
</html>
