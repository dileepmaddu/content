<!DOCTYPE html>
<html>
    <head>
        <title> Absolute-position </title>
        <style>
            img{
                position:absolute;
                left:50px;
                bottom:50px;
                transform: translate(-50%,-50%);
            }
        </style>
    </head>
    <body>
        <img src="logo.jpg" alt="careerIT">
    </body>
</html>
