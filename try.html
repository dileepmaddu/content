<!DOCTYPE html>
<html>
    <head>
        <title> grid faq </title>
        <style>
            .parent{
                height: 100vh;
                display: grid;
                grid-template-rows: 150px 150px 150px 150px;
                grid-template-columns: 2fr 2fr 2fr 4fr;
                grid-template-areas:
                     "header header header header"
                     "smallbox1 smallbox2 smallbox3 sidebar"
                     "content content content sidebar"
                     "footer footer footer footer";
                     gap:10px;
            }
            .header{
               grid-area: header;
               background-color:orange;
            }
            .smallbox1{
               grid-area:smallbox1;
               background-color: orange;
            }
            .smallbox2{

                grid-area: smallbox2;
                background-color: orange;
            }
            .smallbox3{
                grid-area: smallbox3;
                background-color: orange;

            }
            .sidebar{
                grid-area: sidebar;
                background-color: orange;

            }
            .maincontent{
                grid-area: content;
                background-color: orange;

            }
            .footer{
                grid-area: footer;
                background-color: orange;

            }
        </style>
    </head>
    <body>
        <div class="parent">
        <div class="header">header</div>
        <div class="smallbox1"> smallbox1</div>
        <div class="smallbox2">smallbox2</div>
        <div class="smallbox3">smallbox3</div>
        <div class="sidebar">sidebar</div>
        <div class="maincontent">main content</div>
        <div class="footer">footer</div>
        </div>
    </body>
</html>
