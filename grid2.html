<!DOCTYPE html>
<html>
    <head>
        <title> CSS- grid2</title>
    </head>
    <style>
        .parent{
            height: 100vh;
            text-align: center;
            color: white;
            display: grid;
            grid-template-rows: 10% 10% 80%;
            grid-template-columns: 30% 30% 40%;
            gap:10px;
        }
        .header{
            background-color: orange;
            grid-column: 1/4;
            grid-row: 1/2;
        }
        .search{
            background-color: rgb(0, 255, 34);
            grid-column: 1/3;
            grid-row: 2/3;
        }
        .left{
            background-color: cyan;
            grid-column: 1/2;
            grid-row: 3/4;
        }
        .right{
            background-color: red;
            grid-column: 3/4;
            grid-row: 2/4;
        }
        .middle{
            background-color: rgb(124, 0, 128);
            grid-column: 2/3;
            grid-row: 3/4;
        }
    </style>
    <body>
        <div class="parent"> 
        <div class="header">header</div>
        <div class="search"> search</div>
        <div class="left"> left side bar </div>
        <div class="right"> right side bar </div>
        <div class="middle"> middle column </div>
        </div>
    </body>
</html>
