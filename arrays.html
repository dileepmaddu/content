        <!--script>
            /*
            some()
                if atleast one element satisfies the  condition it will true otherwie false
            */
            let arr1=[10,20,30,40,50];
            let flag =  arr1.some((element,index)=>{
                return element<=10;
            })
            document.write(flag);

            let flag1 =  arr1.some((element,index)=>{
                return element<10;
            })
            document.write(flag1);
        </script-->
        <!--script>
             /*
            Every()
                if all elements satisfies the  condition it will true otherwie false
            */
            let arr1=[10,20,30,40,50];
            let flag =  arr1.every((element,index)=>{
                return element<=50;
            })
            document.write(flag);

                return element<50;

            document.write(flag1);
        </script-->
        <!--script>
            /*
            map()
            ******
                map() used to manipulate every element in array
                map() function released in ES6 version
                map() function called as higher order function(hof)
                map() function will return new array 
                map() function is immutable function*/
        </script-->
        <!--script>
            let arr1=[10,20,30,40,50];

        </script-->
        <!--script>
            /*
            filter()
            **********
                filter() function used to apply conditions
                filter() function released in ES6 version
                filter() function called higher order function

                filter() function is immutable function*/
        </script-->
        <!--script>
            let arr1=[1,2,3,4,5];

        </script-->
        <!--script>
            /*
            reduce()
            **********
            reduce() function used to sum of array elements
            reduce() function released in ES6 version
            reduce() function called higher order function
            reduce() function will return new array
            reduce() function is immutable function
            starting value in reduce function called as "Accumulator" in below example 150 acts as Accumulator
            */
           let arr1=[10,20,30,40,50];
           let sum1= arr1.reduce((firstElement,nextElement)=>{
               return firstElement + nextElement;
            });
            document.write(sum1);

            let sum2= arr1.reduce((firstElement,nextElement)=>{
               return firstElement + nextElement;
            },150);
            document.write(sum2);



        </script-->
        <!--script>
            /*
            reduceRight()
            ****************
                used to do concatenation from right to left
            */
           let arr1=['JS','TO','WELCOME'];
           let res= arr1.reduceRight((firstElement,nextElement)=>{
               return firstElement + " "+ nextElement;
            });
            document.write(res);

        </script-->
        <script>
            /*
            push:used to add element at the end of the array
            unshift:add element at the beginning of the array
            pop:deletes element from the end of existing array
            shift:deletes element from the begin of the existing array
            */
            let arr1=[20,30,40];
            console.log(arr1);
            
            arr1.push(50);
            console.log(arr1);

            arr1.unshift(10);
            console.log(arr1);

           arr1.pop(50);
           console.log(arr1);

           arr1.shift(10);
           console.log(arr1);
        </script>
