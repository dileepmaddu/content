<!DOCTYPE html>
<html>
    <head>
        <title> CSS- grid</title>
    </head>
    <style>
        .parent{
            height: 100vh;
            text-align: center;
            color: white;
            display: grid;
            grid-template-rows: 10% 80% 10%;
            grid-template-columns: 15% 70% 15%;
            gap:10px;
        }
        .header{
            background-color: blue;
            grid-column: 1/4;
            grid-row: 1/2;
        }
        .left{
            background-color: lightblue;
            grid-column: 1/2;
            grid-row: 2/3;
        }
        .content{
            background-color: gray;
            grid-column: 2/3;
            grid-row: 2/3;
        }
        .right{
            background-color: lightblue;
            grid-column: 3/4;
            grid-row: 2/3;
        }
        .footer{
            background-color: blue;
            grid-column: 1/4;
            grid-row: 3/4;
        }
    </style>
    <body>
        <div class="parent"> 
        <div class="header">header</div>
        <div class="left"> left menu </div>
        <div class="content"> content </div>
        <div class="right"> right menu </div>
        <div class="footer"> footer </div>
        </div>
    </body>
</html>
