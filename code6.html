<!DOCTYPE html>
<html>
    <head>
        <title>
            CREATE TABLES IN HTML
        </title>
    </head>
    <body>
        <table border="2"
               align="center"
               cellpadding="10"
               cellspacing="10">
                <!--Row 1-->
            <tr>
                <th>column 1</th>
                <th>column 2</th>
                <th>column 3</th>
            </tr>`
                 <!--Row-2-->
            <tr>
            <td rowspan="2">Row 1 Cell 1</td>
            <td>Row 1 Cell 2</td>
            <td>Row 1 cell 3</td>
            </tr>
             <!--Row-3-->
            <tr>
            <td>Row 2 Cell 2</td>
            <td>Row 2 cell 3</td>
            </tr>
            <!--Row--4--->
            <tr>
                <td>Row 3 cell 1</td>
            </tr>

            </table>
    </body>
</html>
