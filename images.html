<!DOCTYPE html>
<html>
    <head>
        <title>Images</title>
        <style>
            img{
                border: 1px solid black;
                padding: 20px;
                border-radius: 20px;
                margin: 20px;
            }
            .c1:hover{
                border: 10px solid green;
            }
            .c2:hover{
                width: 150px;
                height: 150px;
                border: 10px solid black;
                border-radius: 100%;
            }
            .c3:hover{
                display:none;
            }
        </style>
    </head>
    <body>
        <img src="flipkart.jpg"alt="flipkart" class="c1">
        <img src="amazon.png" alt="amazon" class="c2">
        <img src="logo.jpg" alt="careerit" class="c3">
                            
        
        </html>
